<!DOCTYPE html>
<html>

<head>
  <style>
    body {
      background: #050f24;
      color: white;
      padding: 50px;
    }

    .logo-test {
      display: flex;
      gap: 20px;
      align-items: center;
      flex-wrap: wrap;
    }

    .logo-img {
      height: 48px;
      width: auto;
      opacity: 0.7;
      transition: opacity 0.3s;
      object-fit: contain;
    }

    .logo-fix-png {
      /* For transparent PNGs that are black: just make them white */
      filter: brightness(0) invert(1);
    }

    .logo-fix-bg {
      /* For white-background images: invert to black background, then screen */
      filter: grayscale(100%) invert(1) brightness(10);
      mix-blend-mode: screen;
    }

    /* Let's see what happens if we apply to all */
  </style>
</head>

<body>
  <div class="logo-test">
    <img src="/logos/sapiema.png" className="logo-img logo-fix-png" />
    <img src="/logos/fi.png" className="logo-img logo-fix-png" />
    <img src="/logos/twitter-x.png" className="logo-img logo-fix-png" />
    <img src="/logos/amazon.png" className="logo-img logo-fix-png" />
    <img src="/logos/google.png" className="logo-img logo-fix-png" />
    <img src="/logos/sporttotal.png" className="logo-img logo-fix-png" />
    <img src="/logos/crossengage.png" className="logo-img logo-fix-png" />
    <img src="/logos/sorcova_health.png" className="logo-img logo-fix-png" />
  </div>
</body>

</html>
